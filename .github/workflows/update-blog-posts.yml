name: Update blog posts in README

on:
  repository_dispatch:
    types:
      - sanity-blog-published

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-blog-posts
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for blog API deployment
        if: github.event_name == 'repository_dispatch'
        run: sleep 300

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update README blog posts
        run: node scripts/update-blog-posts.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet README.md; then
            echo "README.md is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update blog posts in README"
          git push
